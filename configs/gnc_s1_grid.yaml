success_thresholds: [10, 20]
variants:
  # === Baseline planners (slow blend 80/40 + terminal intercept 30m) ===
  - name: predictive_nearest
    agent_kwargs:
      planner_mode: predictive_nearest
  - name: cluster_predictive
    agent_kwargs:
      planner_mode: cluster_predictive
  - name: urgency_aware
    agent_kwargs:
      planner_mode: urgency_aware

  # === Low gain sweep (R2 showed kp=8 > kp=12) ===
  - name: low_gain_kp8
    agent_kwargs:
      planner_mode: predictive_nearest
      kp_tvc: 8.0
      kd_tvc: 1.5
  - name: very_low_gain_kp6
    agent_kwargs:
      planner_mode: predictive_nearest
      kp_tvc: 6.0
      kd_tvc: 1.0
  - name: low_gain_kp10
    agent_kwargs:
      planner_mode: predictive_nearest
      kp_tvc: 10.0
      kd_tvc: 1.8

  # === Terminal intercept distance sweep ===
  - name: terminal_20m
    agent_kwargs:
      planner_mode: predictive_nearest
      terminal_intercept_dist: 20.0
  - name: terminal_40m
    agent_kwargs:
      planner_mode: predictive_nearest
      terminal_intercept_dist: 40.0
  - name: no_terminal
    agent_kwargs:
      planner_mode: predictive_nearest
      terminal_intercept_dist: 0.0

  # === Terminal gain multiplier sweep ===
  - name: terminal_gain_2x
    agent_kwargs:
      planner_mode: predictive_nearest
      terminal_gain_mult: 2.0
  - name: terminal_gain_1x
    agent_kwargs:
      planner_mode: predictive_nearest
      terminal_gain_mult: 1.0

  # === Best combos ===
  - name: low_gain_terminal_40m
    agent_kwargs:
      planner_mode: predictive_nearest
      kp_tvc: 8.0
      kd_tvc: 1.5
      terminal_intercept_dist: 40.0
      terminal_gain_mult: 2.0
  - name: low_gain_cluster
    agent_kwargs:
      planner_mode: cluster_predictive
      kp_tvc: 8.0
      kd_tvc: 1.5
